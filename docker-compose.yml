version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: qdrant
    ports:
      # Bind to loopback only. Qdrant ships with no authentication or TLS, so
      # publishing 6333 on all interfaces (0.0.0.0) would expose an unauthenticated
      # vector store to the whole network (AR-12). For remote access, front it with
      # an authenticating TLS reverse proxy instead of widening this mapping.
      - "127.0.0.1:6333:6333"
    environment:
      # When QDRANT_API_KEY is set, Qdrant enforces it server-side (clients must
      # send a matching api-key header). Empty by default for local development;
      # set it in .env before exposing the service beyond this host.
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: