name: Governance

on:
  push:
    branches: [main, feature/project-phoenix]
  pull_request:
    branches: [main]

jobs:
  giles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Giles repo check
        run: |
          if command -v giles >/dev/null 2>&1; then
            giles repo-check .
          else
            echo "::warning title=Giles governance check did not run::giles is not installed on this runner, so no fail-severity rule in governance/giles_ruleset.yaml was evaluated this run. This job does not currently enforce anything; treat governance/giles_ruleset.yaml severities as aspirational until a giles installation step is added."
          fi
