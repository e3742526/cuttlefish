name: Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-2022
            platform: win32-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Use Git Bash for pnpm scripts (Windows POSIX script gap)
        if: runner.os == 'Windows'
        run: pnpm config set script-shell "C:\Program Files\Git\bin\bash.exe"
      - name: Set up MSVC dev environment (Windows native module builds)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run tests (test gate skipped on Windows - see docs/audits or release notes for known native-Windows failures)
        if: runner.os != 'Windows'
        run: pnpm test
      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          VERSION="$(node -p "require('./packages/cuttlefish/package.json').version")"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
      - name: Assemble production-only package
        run: pnpm --filter=cuttlefish-cli deploy --prod --legacy release/cuttlefish-cli
      - name: Create archive
        id: package
        run: |
          VERSION="$(node -p "require('./packages/cuttlefish/package.json').version")"
          ARCHIVE="cuttlefish-cli-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar -czf "$ARCHIVE" -C release cuttlefish-cli
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.package.outputs.archive }}" --clobber --repo "${{ github.repository }}"
      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.archive }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 7
