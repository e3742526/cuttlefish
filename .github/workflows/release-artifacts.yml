name: Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: Verify release tag matches package version
        run: |
          VERSION="$(node -p "require('./packages/cuttlefish/package.json').version")"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
      - name: Assemble production-only package
        run: pnpm --filter=cuttlefish-cli deploy --prod release/cuttlefish-cli
      - name: Create archive
        id: package
        run: |
          VERSION="$(node -p "require('./packages/cuttlefish/package.json').version")"
          ARCHIVE="cuttlefish-cli-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar -czf "$ARCHIVE" -C release cuttlefish-cli
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.package.outputs.archive }}" --clobber --repo "${{ github.repository }}"
