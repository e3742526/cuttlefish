name: Release Artifacts

on:
  workflow_run:
    workflows: ["Publish npm Package"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  package:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            platform: darwin-arm64
            archive_ext: tar.gz
          - os: windows-2022
            platform: win32-x64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Use Git Bash for pnpm scripts (Windows POSIX script gap)
        if: runner.os == 'Windows'
        run: pnpm config set script-shell "C:\Program Files\Git\bin\bash.exe"
      - name: Set up MSVC dev environment (Windows native module builds)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@7defe9254715b088f12dddd9942945a3d75cdad5 # v1.9.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify npm package contents
        run: pnpm --filter=cuttlefish-cli verify:package
      - name: Verify release tag matches package version
        if: github.event_name == 'workflow_run'
        run: |
          VERSION="$(node -p "require('./packages/cuttlefish/package.json').version")"
          test "v${VERSION}" = "${RELEASE_TAG}"

      # --- Unix: pnpm deploy is fine in-place; junctions are not relocated ---
      - name: Assemble production-only package (Unix)
        if: matrix.platform != 'win32-x64'
        run: pnpm --filter=cuttlefish-cli deploy --prod --legacy release/cuttlefish-cli

      # --- Windows: classic npm node_modules so the zip is relocatable ---
      - name: Assemble portable production package (Windows)
        if: matrix.platform == 'win32-x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pkgSrc = "packages/cuttlefish"
          $contractsSrc = "packages/contracts"
          $staging = "release/cuttlefish-cli"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          foreach ($item in @("LICENSE", "README.md", "dist", "template", "assets")) {
            Copy-Item -Path (Join-Path $pkgSrc $item) -Destination (Join-Path $staging $item) -Recurse -Force
          }
          $vendorContracts = Join-Path $staging "vendor/contracts"
          New-Item -ItemType Directory -Path $vendorContracts -Force | Out-Null
          Copy-Item (Join-Path $contractsSrc "package.json") $vendorContracts
          Copy-Item (Join-Path $contractsSrc "dist") (Join-Path $vendorContracts "dist") -Recurse -Force
          $stagingPkg = Join-Path $staging "package.json"
          $srcPkg = Join-Path $pkgSrc "package.json"
          node --input-type=module -e @"
import fs from 'node:fs';
const pkg = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
pkg.dependencies['@cuttlefish/contracts'] = 'file:./vendor/contracts';
delete pkg.bundledDependencies;
fs.writeFileSync(process.argv[2], JSON.stringify(pkg, null, 2) + '\n', 'utf8');
"@ $srcPkg $stagingPkg
          Push-Location $staging
          $env:npm_config_ignore_scripts = "false"
          npm install --omit=dev --no-fund --no-audit
          if ($LASTEXITCODE -ne 0) { throw "npm install failed" }
          $contractsLink = "node_modules/@cuttlefish/contracts"
          if (Test-Path $contractsLink) {
            $item = Get-Item $contractsLink -Force
            if ($item.Attributes -band [IO.FileAttributes]::ReparsePoint) {
              cmd /c "rmdir `"$contractsLink`""
              Copy-Item -Path "vendor/contracts" -Destination $contractsLink -Recurse -Force
            }
          }
          node dist/bin/cuttlefish.js --version
          node -e "import('chokidar').then(()=>console.log('chokidar-ok'))"
          node -e "const D=require('better-sqlite3'); console.log('sqlite-ok', new D(':memory:').prepare('select 1 as n').get())"
          Pop-Location
          @'
          @ECHO OFF
          SETLOCAL
          WHERE node >NUL 2>&1
          IF ERRORLEVEL 1 (
            ECHO cuttlefish: node is not on PATH. Install Node.js 24 first.
            EXIT /B 1
          )
          node "%~dp0cuttlefish-cli\dist\bin\cuttlefish.js" %*
          '@ | Set-Content -Path release/cuttlefish.cmd -Encoding ascii

      - name: Create archive
        id: package
        run: |
          VERSION="$(node -p "require('./packages/cuttlefish/package.json').version")"
          PLATFORM="${{ matrix.platform }}"
          EXT="${{ matrix.archive_ext }}"
          ARCHIVE="cuttlefish-cli-${VERSION}-${PLATFORM}.${EXT}"
          if [ "$EXT" = "zip" ]; then
            (cd release && tar -a -cf "../$ARCHIVE" .)
          else
            tar -czf "$ARCHIVE" -C release .
          fi
          test -f "$ARCHIVE"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          ls -lh "$ARCHIVE"
      - name: Upload release asset
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" "${{ steps.package.outputs.archive }}" --clobber --repo "${{ github.repository }}"
      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.archive }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 7
